spring.datasource.url=jdbc:h2:mem:online_exam_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
app.seed.enabled=false

spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=test-groq-key
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.chat.options.temperature=0.2

jwt.secret=test-secret-key-for-ci-only
jwt.expiration=86400000
