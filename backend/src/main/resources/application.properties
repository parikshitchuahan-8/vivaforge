spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/online_exam_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
server.port=${PORT:8080}

spring.ai.openai.base-url=${GROQ_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.1-8b-instant}
spring.ai.openai.chat.options.temperature=${GROQ_TEMPERATURE:0.2}

# JWT Sec
jwt.secret=${JWT_SECRET:change-me-before-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://vivaforge.vercel.app}

# Seed data
app.seed.enabled=${APP_SEED_ENABLED:true}

