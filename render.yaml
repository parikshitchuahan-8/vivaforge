services:
  - type: web
    name: vivaforge-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/quizzes
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_TEMPERATURE
        value: 0.2
      - key: APP_SEED_ENABLED
        value: false
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
